{% extends 'auth_shell.html' %}

{% block title %}Senha redefinida | Sistema de Vendas{% endblock %}

{% block auth_content %}
    <p class="text-sm font-semibold uppercase tracking-[0.24em] text-stone-500">Senha</p>
    <h1 class="mt-3 font-display text-4xl font-bold text-ink">Senha atualizada</h1>
    <p class="mt-4 text-stone-600">Sua senha foi redefinida com sucesso. Agora voce pode entrar normalmente.</p>
    <a href="{% url 'login' %}" class="mt-8 inline-flex w-full items-center justify-center rounded-2xl bg-clay px-5 py-3 text-sm font-semibold text-white transition hover:bg-[#a94f26]">Entrar</a>
{% endblock %}
